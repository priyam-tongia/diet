<!-- SAVE AS index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;
}

.container {
  max-width:600px;
  margin:auto;
  padding:16px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.title {
  font-size:18px;
  opacity:0.8;
}

.hero-card {
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:16px;
  padding:14px;
  margin-top:10px;
}

.hidden { display:none; }

button {
  border:none;
  border-radius:10px;
  padding:6px 10px;
  background:#6366f1;
  color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <div id="date" class="title"></div>
  <button onclick="toggleTheme()">🌙</button>
</div>

<div class="card">
👥 <input type="number" id="people" value="1" min="1" onchange="render()">
<button onclick="toggleWeek()">Full Week</button>
</div>

<div id="app"></div>

</div>

<script>

let DATA = [];
let showWeek = false;

fetch("data.json")
.then(res => res.json())
.then(data => {
  DATA = data.days;
  render();
});

function getCurrentMeal(){
  let h = new Date().getHours();
  if(h<10) return "morning";
  if(h<12) return "breakfast";
  if(h<17) return "lunch";
  if(h<20) return "snack";
  return "dinner";
}

function render(){
  document.getElementById("date").innerText = new Date().toDateString();
  const people = parseInt(document.getElementById("people").value);
  const current = getCurrentMeal();

  let html = "";

  const daysToShow = showWeek ? DATA : [DATA[new Date().getDay() % DATA.length]];

  daysToShow.forEach(day => {

    html += `<div class="card"><b>${day.day}</b> • ${day.seed}</div>`;

    for(let key in day.meals){
      let meal = day.meals[key];

      if(typeof meal === "string"){
        html += `<div class="card">${meal}</div>`;
        continue;
      }

      let ing = "";
      for(let i in meal.ingredients){
        ing += `${i}: ${meal.ingredients[i]*people}<br>`;
      }

      if(key === current){
        html += `
        <div class="hero-card">
          <b>${key.toUpperCase()}</b><br>
          ${meal.name}<br><br>
          <b>Ingredients:</b><br>${ing}
          <b>Steps:</b><br>${meal.steps.join("<br>")}
        </div>`;
      } else {
        html += `
        <div class="card">
          <b>${key}</b> - ${meal.name}
        </div>`;
      }
    }

  });

  document.getElementById("app").innerHTML = html;
}

function toggleWeek(){
  showWeek = !showWeek;
  render();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
