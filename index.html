<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Diet App</title>

<style>
body {
  font-family: 'Inter', sans-serif;
}
</style>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-white transition duration-300">

<div class="max-w-md mx-auto p-4">

<!-- Header -->
<div class="flex justify-between items-center mb-6">
  <button onclick="toggleMenu()" class="text-xl">☰</button>
  <div id="date" class="text-sm opacity-70"></div>
  <button onclick="toggleTheme()" class="text-xl">🌙</button>
</div>

<!-- Controls -->
<div class="bg-white dark:bg-slate-800 shadow-md rounded-xl p-3 flex items-center gap-3">
  <span>👥</span>
  <input id="people" type="number" value="1"
    class="w-16 px-2 py-1 rounded bg-slate-200 dark:bg-slate-700 text-black dark:text-white"
    onchange="render()">
  <button onclick="toggleWeek()"
    class="ml-auto bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded-lg">
    Full Week
  </button>
</div>

<!-- Content -->
<div id="app" class="mt-4"></div>

<!-- Prep -->
<div id="prep" class="mt-6"></div>

</div>

<!-- Side Menu -->
<div id="menu"
  class="fixed top-0 left-[-260px] w-64 h-full bg-white dark:bg-slate-800 shadow-lg p-4 transition-all duration-300 z-50">
</div>

<script>

let DATA = [];
let selectedDay = getISTDay();
let showWeek = false;

// IST Fix
function getISTDay(){
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset()*60000);
  const ist = new Date(utc + (5.5*60*60*1000));
  return ist.getDay();
}

fetch("data.json")
.then(r=>r.json())
.then(d=>{
  DATA = d.days;
  buildMenu();
  render();
});

function getCurrentMeal(){
  const h = new Date().getHours();
  if(h<10) return "morning";
  if(h<12) return "breakfast";
  if(h<17) return "lunch";
  if(h<20) return "snack";
  return "dinner";
}

function render(){

  document.getElementById("date").innerText =
    "Today • " + new Date().toDateString();

  const people = +document.getElementById("people").value;
  const current = getCurrentMeal();

  const days = showWeek ? DATA : [DATA[selectedDay % DATA.length]];

  let html = "";
  let prepHtml = `
    <div class="bg-white dark:bg-slate-800 shadow rounded-xl p-4">
    <b>🧠 Tomorrow Prep</b><br>
  `;

  days.forEach(day => {

    html += `
      <div class="mt-4 text-indigo-500 font-semibold">
        ${day.day} • ${day.seed}
      </div>
    `;

    for(let key in day.meals){

      let meal = day.meals[key];

      if(typeof meal === "string"){
        html += `
          <div class="bg-white dark:bg-slate-800 shadow p-3 rounded-xl mt-2">
            ${meal}
          </div>`;
        continue;
      }

      let ing="";
      for(let i in meal.ingredients){
        ing += `${i}: ${meal.ingredients[i]*people}<br>`;
      }

      let isActive = key===current;

      html += `
      <div class="mt-3 rounded-xl p-4 cursor-pointer transition
        ${isActive
          ? "bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg"
          : "bg-white dark:bg-slate-800 shadow"}
      " onclick="toggle(this)">
        
        <div class="font-semibold">
          ${getIcon(key)} ${key.toUpperCase()} • ${meal.name}
        </div>

        <div class="${isActive ? "" : "hidden"} mt-2 details text-sm">
          <b>Ingredients:</b><br>${ing}
          <b>Steps:</b><br>${meal.steps.join("<br>")}
        </div>
      </div>
      `;

      if(meal.prep){
        meal.prep.forEach(p=>{
          prepHtml += "• " + p + "<br>";
        });
      }
    }

  });

  prepHtml += "</div>";

  document.getElementById("app").innerHTML = html;
  document.getElementById("prep").innerHTML = prepHtml;
}

function toggle(el){
  el.querySelector(".details").classList.toggle("hidden");
}

function toggleTheme(){
  document.documentElement.classList.toggle("dark");
}

function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.left = m.style.left === "0px" ? "-260px" : "0px";
}

function buildMenu(){
  let m = document.getElementById("menu");
  DATA.forEach((d,i)=>{
    m.innerHTML += `
      <div onclick="selectDay(${i})"
        class="p-2 cursor-pointer hover:bg-indigo-100 dark:hover:bg-slate-700 rounded">
        ${d.day}
      </div>`;
  });
}

function selectDay(i){
  selectedDay=i;
  toggleMenu();
  render();
}

function toggleWeek(){
  showWeek=!showWeek;
  render();
}

// Icons
function getIcon(key){
  return {
    morning:"🌅",
    breakfast:"🍳",
    lunch:"🥗",
    snack:"☕",
    dinner:"🌙"
  }[key] || "";
}

</script>

</body>
</html>
